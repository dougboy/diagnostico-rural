<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pagamento não aprovado</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',sans-serif;background:#F5F5F5;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}.card{background:#fff;border-radius:16px;padding:48px 40px;max-width:480px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.1)}h1{font-size:22px;font-weight:800;color:#B91C1C;margin-bottom:12px}p{font-size:15px;color:#555;line-height:1.7;margin-bottom:16px}.btn{display:inline-block;background:#1A5C38;color:#fff;text-decoration:none;padding:14px 28px;border-radius:8px;font-weight:700;font-size:15px;margin-top:8px}</style></head>
<body>
<div class="card">
  <div style="font-size:48px;margin-bottom:16px">❌</div>
  <h1>Pagamento não aprovado</h1>
  <p>Não foi possível processar seu pagamento. Isso pode ter acontecido por saldo insuficiente, dados incorretos ou limite do cartão.</p>
  <p>Tente novamente com outro meio de pagamento (Pix é a opção mais rápida e sem falhas).</p>
  <a href="/" class="btn">Tentar novamente</a>
</div>
</body></html>
