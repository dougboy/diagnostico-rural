<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Confirmando pagamento...</title>
<meta http-equiv="refresh" content="10">
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',sans-serif;background:#F5F5F5;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}.card{background:#fff;border-radius:16px;padding:48px 40px;max-width:480px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.1)}.spinner{width:48px;height:48px;border:4px solid #E8F5EE;border-top-color:#1A5C38;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 24px}@keyframes spin{to{transform:rotate(360deg)}}h1{font-size:20px;font-weight:700;color:#1A5C38;margin-bottom:10px}p{font-size:14px;color:#555;line-height:1.7}</style></head>
<body>
<div class="card">
  <div class="spinner"></div>
  <h1>Confirmando seu pagamento...</h1>
  <p>Estamos aguardando a confirmação do Mercado Pago. Esta página atualiza automaticamente a cada 10 segundos.</p>
  <p style="margin-top:16px;font-size:13px;color:#888">Se demorar mais de 5 minutos, verifique seu email — o link do formulário será enviado assim que o pagamento for aprovado.</p>
</div>
</body></html>
